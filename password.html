<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récupération de mot de passe</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-[#494C4F] min-h-screen flex justify-center items-center px-4 py-8">

    <form action="" class="w-full max-w-[400px]">

        <div class="flex justify-center items-center text-[#FFFFFFDE] font-bold text-[21px] gap-4 mb-6">
            <img src="IMAGE/logo-red.png" alt="" class="w-[32px] h-[32px]">
            <h1>RED PRODUCT</h1>
        </div>

        <div class="bg-[#F0F0F0] flex flex-col px-6 py-8 rounded-lg w-full">
            <h1 class="font-medium text-[17px] mb-4">Mot de passe oublié ?</h1>
            <p class="text-justify text-[16px]  mb-6">
                Entrez votre adresse e-mail ci-dessous et nous vous envoyons des instructions sur la façon de modifier votre mot de passe.
            </p>

            <input type="email" placeholder="Votre e-mail"
                class="mb-6 w-full h-[45px] border-b border-[#A0A0A033] bg-transparent outline-none text-[15px]">

            <button type="submit"
                class="bg-[#45484B] text-white py-3 w-full rounded-lg text-[15px] cursor-pointer hover:bg-[#333333] transition">
                Envoyer
            </button>
        </div>

        <div class="flex justify-center mt-6">
            <p class="text-[#FFFFFFDE] text-[18.67px]">
                Revenir à la <a href="connexion.html" class="text-[#FFD964] font-bold">connexion</a>
            </p>
        </div>

    </form>

</body>

</html>
